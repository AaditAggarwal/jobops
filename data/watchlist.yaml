# watchlist.yaml — board tokens polled every cycle, keyed by ATS.
#
# Format:
#   greenhouse:      [token, ...]   # boards.greenhouse.io/{token}
#   lever:           [token, ...]   # jobs.lever.co/{token}
#   ashby:           [token, ...]   # jobs.ashbyhq.com/{token}
#   smartrecruiters: [token, ...]   # jobs.smartrecruiters.com/{token}  (case-sensitive)
#
# Finding a token: open the company's careers page and read it out of the URL
# (boards.greenhouse.io/stripe -> stripe). Verify additions with
#   uv run python scripts/check_watchlist.py
# which flags dead/renamed boards (SmartRecruiters never 404s — zero postings
# is the "dead token" signal there; huge SR boards are excluded to keep the
# pagination budget sane). Curate freely; pollers reload this file every run.
#
# Curation policy: no ITAR/defense/clearance shops (can't sponsor F-1->H-1B),
# no staffing/consulting mills, no non-US-only boards. Trimmed 2026-07-20 to
# keep GitHub Actions cycles fast — quality over quantity; obscure tier-3
# boards cut (user-approved).

