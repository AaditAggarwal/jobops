services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jobops
      POSTGRES_PASSWORD: jobops
      POSTGRES_DB: jobops
    ports:
      - "5432:5432"
    volumes:
      - jobops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobops -d jobops"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  jobops_pgdata:
