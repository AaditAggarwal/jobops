name: poll-jobs
on:
  schedule: [{cron: "*/30 * * * *"}]   # every 30 min (user-approved cadence; jitter fine)
  workflow_dispatch:
  push:
    branches: [main]                   # smoke-test every change immediately;
    paths-ignore: ["docs/**", "*.md"]  # safe: concurrency-guarded + idempotent

concurrency:
  group: poll-jobs           # never poll from two workflow runs at once;
  cancel-in-progress: false  # queue instead — cancelling killed healthy runs when
                             # cron fired mid-cycle; 15-min job timeouts bound queuing

# Pollers run as parallel jobs. Big providers are split into TWO jobs over
# disjoint board halves (JOBOPS_SHARD) — each provider sees at most 2
# sequential streams, never the same board twice (user-approved politeness
# amendment, 2026-07-20; runner IPs are tarpitted ~7-30s/request, so one
# sequential pass cannot finish a large provider inside a cycle).
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 28   # slow-IP draws hit ~30s/board; cycle is 30 min
    strategy:
      fail-fast: false
      matrix:
        include:
          - {poller: greenhouse, shard: "0/2"}
          - {poller: greenhouse, shard: "1/2"}
          - {poller: ashby, shard: "0/2"}
          - {poller: ashby, shard: "1/2"}
          - {poller: lever}
          - {poller: smartrecruiters}
          - {poller: github_repos}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e .
      - run: python -m jobops.ingest.${{ matrix.poller }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}     # hosted Postgres (Supabase pooler URL)
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          PYTHONUNBUFFERED: "1"                          # stream logs live in the Actions UI
          JOBOPS_BACKOFF_RETRIES: "0"                    # runner IPs get 429'd heavily; skip
          JOBOPS_BACKOFF_CAP: "5"                        # throttled boards self-heal next cycle
          JOBOPS_SHARD: ${{ matrix.shard }}              # empty -> poll all boards

  enrich:
    needs: poll
    if: always()              # dedup/prune even when one poller job failed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e .
      - run: |
          python -m jobops.enrich.dedup
          python -m jobops.enrich.sponsor_match
          python -m jobops.enrich.retention
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
