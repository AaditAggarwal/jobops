name: poll-jobs
on:
  schedule: [{cron: "*/30 * * * *"}]   # every 30 min (user-approved cadence; jitter fine)
  workflow_dispatch:
  push:
    branches: [main]                   # smoke-test every change immediately;
    paths-ignore: ["docs/**", "*.md"]  # safe: concurrency-guarded + idempotent

concurrency:
  group: poll-jobs           # never poll from two workflow runs at once;
  cancel-in-progress: false  # queue instead — cancelling killed healthy runs when
                             # cron fired mid-cycle; 15-min job timeouts bound queuing

# Pollers run as parallel jobs — one per ATS provider, so each provider still
# sees a single sequential client (the polite-client rule is per-provider).
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        poller: [greenhouse, lever, ashby, smartrecruiters, github_repos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e .
      - run: python -m jobops.ingest.${{ matrix.poller }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}     # hosted Postgres (Supabase pooler URL)
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          PYTHONUNBUFFERED: "1"                          # stream logs live in the Actions UI
          JOBOPS_BACKOFF_RETRIES: "0"                    # runner IPs get 429'd heavily; skip
          JOBOPS_BACKOFF_CAP: "5"                        # throttled boards self-heal next cycle

  enrich:
    needs: poll
    if: always()              # dedup/prune even when one poller job failed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e .
      - run: |
          python -m jobops.enrich.dedup
          python -m jobops.enrich.sponsor_match
          python -m jobops.enrich.retention
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
