name: poll-jobs
on:
  schedule: [{cron: "*/20 * * * *"}]   # every 20 min (Actions may add jitter; fine)
  workflow_dispatch:

concurrency:
  group: poll-jobs          # never poll from two runners at once (polite client)
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e .
      - name: poll all boards
        run: |
          python -m jobops.ingest.greenhouse
          python -m jobops.ingest.lever
          python -m jobops.ingest.ashby
          python -m jobops.ingest.smartrecruiters
          python -m jobops.ingest.github_repos
          python -m jobops.enrich.dedup
          python -m jobops.enrich.retention
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}     # hosted Postgres (e.g. Supabase pooler URL)
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          PYTHONUNBUFFERED: "1"                          # stream poller logs live in the Actions UI
          JOBOPS_BACKOFF_RETRIES: "1"                    # runner IPs get 429'd heavily; skip fast,
          JOBOPS_BACKOFF_CAP: "5"                        # throttled boards self-heal next cycle
