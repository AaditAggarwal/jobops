name: poll-jobs
on:
  schedule: [{cron: "*/10 * * * *"}]   # every 10 min (Actions may add jitter; fine)
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e .
      - name: poll all boards
        run: |
          python -m jobops.ingest.greenhouse
          python -m jobops.ingest.lever
          python -m jobops.ingest.ashby
          python -m jobops.ingest.smartrecruiters
          python -m jobops.ingest.github_repos
          python -m jobops.enrich.dedup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}     # hosted Postgres (e.g. Supabase pooler URL)
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
